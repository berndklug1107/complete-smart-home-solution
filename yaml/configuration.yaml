        value_template: "{{ '%.2f' | format(value | float) }}"
        scan_interval: 60
  - sensor:
        name: CPU_tempzero05
        command: ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.69 "LC_ALL=C awk '{printf(\"%.3f\\n\", \$1/1000)}' /sys/class/thermal/thermal_zone0/temp"
        unit_of_measurement: '°C'
        device_class: temperature
        value_template: "{{ '%.2f' | format(value | float) }}"
        scan_interval: 60
  - sensor:
