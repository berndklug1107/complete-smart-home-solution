default_config:
recorder:

frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

rflink:
  port: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
#  wait_for_ack: false

# light:
#  - platform: rflink
#    automatic_add: false
    
sensor:
  - platform: rflink
    devices:
      prologue_9010_hum:
        sensor_type: humidity      
        name: hum_tfa01
      prologue_9010_temp:
        sensor_type: temperature
        name: temp_tfa01
      prologue_9020_hum:
        sensor_type: humidity      
        name: hum_tfa02
      prologue_9020_temp:
        sensor_type: temperature
        name: temp_tfa02
    automatic_add: false

switch:
  - platform: rflink
    devices:
       kaku_000041_1:
         name: switch_a01
       kaku_000041_2:
         name: switch_a02
       kaku_000041_3:
         name: switch_a03
       kaku_000041_4:
         name: switch_a04
       kaku_000042_1:
         name: switch_b01
       kaku_000042_2:
         name: switch_b02
         
   #    ev1527_093200_01:
   #      name: ev01
     #  ev1527_093200_02:
   #      name: ev02
   #    ev1527_093200_04:
    #     name: ev03
   #    ev1527_093200_08:
    #     name: ev04
    automatic_add: false

mqtt:
  sensor:
    - name: "Lux Terrasse"
      state_topic: "cam03/sensor/lux"
      device_class: illuminance
      unit_of_measurement: "lx"

    - name: "Temp Terrasse"
      state_topic: "cam03/sensor/temp_out"
      device_class: temperature
      unit_of_measurement: "°C"

    - name: "Humidity Terrasse"
      state_topic: "cam03/sensor/humidity"
      device_class: humidity
      unit_of_measurement: "%"

command_line:
  - sensor:
        name: CPU_temp401
        command: cat /sys/class/thermal/thermal_zone0/temp
        unit_of_measurement: '°C'
        device_class: temperature
        value_template: "{{ '%.2f' | format(value | float / 1000) }}"
        scan_interval: 60        
  - sensor:
        name: CPU_temp501
        command: ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.20 "LC_ALL=C awk '{printf(\"%.3f\\n\", \$1/1000)}' /sys/class/thermal/thermal_zone0/temp"
        unit_of_measurement: '°C'
        device_class: temperature
        value_template: "{{ '%.2f' | format(value | float) }}"
        scan_interval: 60
  - sensor:
        name: CPU_tempzero01
        command: ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.85 "LC_ALL=C awk '{printf(\"%.3f\\n\", \$1/1000)}' /sys/class/thermal/thermal_zone0/temp"
        unit_of_measurement: '°C'
        device_class: temperature
        value_template: "{{ '%.2f' | format(value | float) }}"
        scan_interval: 60
