        unit_of_measurement: '°C'
        device_class: temperature
        value_template: "{{ '%.2f' | format(value | float) }}"
        scan_interval: 60
        
  - sensor:
        name: cam01_temp
        command: ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.85 "LC_ALL=C awk -F't=' '/t=/ {printf(\"%.3f\\n\", \$2/1000)}' /sys/bus/w1/devices/28-5ad8c5356461/w1_slave"
        unit_of_measurement: '°C'
        device_class: temperature
        value_template: "{{ '%.2f' | format(value | float) }}"
        scan_interval: 60

  - sensor:
        name: cam03_temp
        command: ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.30 "LC_ALL=C awk -F't=' '/t=/ {printf(\"%.3f\\n\", \$2/1000)}' /sys/bus/w1/devices/28-d0e0c5356461/w1_slave"
        unit_of_measurement: '°C'
        device_class: temperature
        value_template: "{{ '%.2f' | format(value | float) }}"
        scan_interval: 60

  - sensor:
        name: touch_temp
        command: ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.20 "LC_ALL=C awk -F't=' '/t=/ {printf(\"%.3f\\n\", \$2/1000)}' /sys/bus/w1/devices/28-a6d3c5356461/w1_slave"
        unit_of_measurement: '°C'
        device_class: temperature
        value_template: "{{ '%.2f' | format(value | float) }}"
        scan_interval: 60


shell_command:

    frigate_stop: "ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.20 docker stop frigate"
    frigate_restart: "ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.20 docker restart frigate"

    down_pi501: "ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.20 sudo shutdown now"
    reboot_pi501: "ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.20 sudo reboot now"
    re_mtx: "ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.20 sudo systemctl restart mediamtx"
    stop_mtx: "ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.20 sudo systemctl stop mediamtx"
    
    down_zero01: "ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.85 sudo shutdown now"
    down_zero02: "ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.77 sudo shutdown now"    
    down_zero03: "ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.30 sudo shutdown now"
    down_zero05: "ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.69 sudo shutdown now"
    down_zero06: "ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.79 sudo shutdown now"
    
    
    reboot_zero01: "ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.85 sudo reboot now"
    reboot_zero02: "ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.77 sudo reboot now"    
    reboot_zero03: "ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.30 sudo reboot now"
    reboot_zero05: "ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.69 sudo reboot now"
    reboot_zero06: "ssh -i /config/ssh_keys/id_rsa -o StrictHostKeyChecking=no pi@10.0.0.79 sudo reboot now"     


