substitutions:           # Windfang 
  device_name: esp-02

esphome:
  name: ${device_name}

esp8266:
  board: d1_mini

logger:


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "${device_name} Hotspot"
    password: "HjfKiEOmFUGl"

captive_portal:

mqtt:
  broker: 10.0.0.21
  username: mqtt
  password: mqtt
  discovery: false


button:
  - platform: restart
    name: '${device_name} Restart'
    internal: false


i2c:
  - id: bus_a
    sda: GPIO4
    scl: GPIO5
    scan: true

mcp23017:
  - id: i2c_expand05      #   Windfang
    address: 0x20
    i2c_id: bus_a

sensor:

  - platform: wifi_signal
    name: "WiFi Signal ${device_name}"
    update_interval: 60s

  - platform: dht
    pin: GPIO2
    temperature:
      name: "Temp Windfang"
      filters:
       - offset: 0.6
    humidity:
      name: "Humidity Windfang"
      filters:
       - offset: 0
    model: dht22
    update_interval: 50s

  - platform: dht
    pin: GPIO14
    temperature:
      name: "Temp Eingang EG"
      filters:
       - offset: 0
    humidity:
      name: "Humidity Eingang EG"
      filters:
       - offset: 0
    model: dht22
    update_interval: 50s

  - platform: dht
    pin: GPIO0
    temperature:
      name: "Temp Bad"
      filters:
       - offset: 0.5
    humidity:
      name: "Humidity Bad"
      filters:
       - offset: 6
    model: dht22
    update_interval: 50s


binary_sensor:

  - platform: gpio
    name: "bin_sens_40"
    id: bin_sens_40
    pin:
      mcp23xxx: i2c_expand05
      number: 0
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_state:
         - mqtt.publish:
             topic: "esp32-02/switch/i2c_relay05_sw10/command"
             payload: "TOGGLE" 

  - platform: gpio
    name: "bin_sens_41"
    id: bin_sens_41
    pin:
      mcp23xxx: i2c_expand05
      number: 1
      mode:
        input: true
        pullup: true
      inverted: false
    device_class: light
    on_state:
      - mqtt.publish:
          topic: "esp32-02/switch/i2c_relay05_sw11/command"
          payload: "TOGGLE"    


  - platform: gpio
    name: "bin_sens_42"
    id: bin_sens_42
    pin:
      mcp23xxx: i2c_expand05
      number: 2
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_multi_click:
    - timing:
        - ON for at most 0.3s
        - OFF for at least 0.4s
      then:
         - homeassistant.service:
             service: light.toggle
             data:
               entity_id: light.light01
     #          brightness: 40%
    on_press:
      then:
        - mqtt.publish:
            topic: "dimmer/dimm_script01"
            payload: "pressed01"
    on_release:
      then:
        - mqtt.publish:
            topic: "dimmer/dimm_script01"
            payload: "released01"

  - platform: gpio
    name: "bin_sens_43"
    id: bin_sens_43
    pin:
      mcp23xxx: i2c_expand05
      number: 3
      mode:
        input: true
        pullup: true
      inverted: false
    device_class: light
    on_state:
         - mqtt.publish:
             topic: "esp32-02/switch/i2c_relay05_sw11/command"
             payload: "TOGGLE" 

  - platform: gpio
    name: "bin_sens_44"
    id: bin_sens_44
    pin:
      mcp23xxx: i2c_expand05
      number: 4
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_multi_click:
    - timing:
        - ON for at most 0.3s
        - OFF for at least 0.6s
      then:
        - mqtt.publish:
            topic: "esp32-02/switch/i2c_relay05_sw09/command"
            payload: "TOGGLE" 
    - timing:
        - ON for 0.3s to 0.8s
        - OFF for at least 0.4s
      then:
        - homeassistant.service:
            service: media_player.play_media
            data:
              entity_id: media_player.nad_bad
      #        media_content_id: media-source://dlna_dms/gerbera/:77
              media_content_id: "http://10.0.0.85:8083/main_flac"  
              media_content_type: "music"
    - timing:
        - ON for 0.8s to 1.6s
        - OFF for at least 0.4s
      then:
        - homeassistant.service:
            service: media_player.play_media
            data:
              entity_id: media_player.nad_bad
    #          media_content_id: media-source://dlna_dms/gerbera/:47
              media_content_id: "http://10.0.0.85:8082/rock_flac"
              media_content_type: "music"   

    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for at most 0.3s
        - OFF for at most 0.4s
        - ON for at most 0.3s
        - OFF for at least 0.4s
      then:
        - homeassistant.service:
            service: media_player.play_media
            data:
              entity_id: media_player.nad_bad
        #      media_content_id: media-source://dlna_dms/gerbera/:62
              media_content_id: "http://10.0.0.85:8084/mellow_flac"
              media_content_type: "music"

  - platform: gpio
    name: "bin_sens_45"
    id: bin_sens_45
    pin:
      mcp23xxx: i2c_expand05
      number: 5
      mode:
        input: true
        pullup: true
      inverted: false
    device_class: light
    on_state:
      - mqtt.publish:
          topic: "esp32-02/switch/i2c_relay05_sw10/command"
          payload: "TOGGLE" 

  - platform: gpio
    name: "bin_sens_46"
    id: bin_sens_46
    pin:
      mcp23xxx: i2c_expand05
      number: 7
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: door
    on_multi_click:
    - timing:
        - ON for at most 0.4s
        - OFF for at most 0.4s
        - ON for at most 0.4s
        - OFF for at most 0.4s
        - ON for at least 2.0s

        - OFF for at most 0.4s
        - ON for at most 0.4s
        - OFF for at most 0.4s
        - ON for at least 2.0s
        
        - OFF for at most 0.4s
        - ON for at least 2.0s
        - OFF for at least 0.4s

      then:
        - mqtt.publish:
            topic: "esp32-02/button/door_eg/command"
            payload: "PRESS"

    on_click:
      min_length: 0.1s
      max_length: 1.9s
      then:
        - delay: 2s
        - if:
            condition:
              binary_sensor.is_on: bin_sens_46
            then:
              - logger.log: "Taste noch gedrückt - kein Klick"
            else:
              - homeassistant.service:
                  service: script.turn_on
                  data:
                    entity_id: script.kueche_klingelton

              

  - platform: gpio          # PIR Eingang EG
    name: "pir03"
    id: pir03
    icon: mdi:motion-sensor
    pin:
      mcp23xxx: i2c_expand05
      number: 6
    device_class: motion
