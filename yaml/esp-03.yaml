substitutions:
  device_name: esp-03     #   Speis

esphome:
  name: ${device_name}

external_components:
  - source:
      type: local
      path: components

esp8266:
  board: d1_mini

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA

  ap:
    ssid: "${device_name} Hotspot"
    password: "tXr1MCl61gw2"

captive_portal:

mqtt:
  broker: 10.0.0.21
  username: mqtt
  password: mqtt
  discovery: false

  on_message:
    - topic: "dimmer/dimm_script02"
      payload: "pressed02"
      then:
        - lambda: id(dim_control02).publish_state(true);
        - script.execute:
            id: dimm_script02
            target_light: light02
            trigger_binary: dim_control02
    - topic: "dimmer/dimm_script02"
      payload: "released02"
      then:
        - lambda: id(dim_control02).publish_state(false);

script:
  - id: dimm_script02
    parameters:
      target_light: esphome::light::LightState*
      trigger_binary: esphome::binary_sensor::BinarySensor*
    mode: restart
    then:
      - delay: 1.2s 
      - while:
          condition:
            lambda: return trigger_binary->state;
          then:
            - lambda: |-
                if (target_light == nullptr || trigger_binary == nullptr) return;         
                float current_b = target_light->remote_values.get_brightness();
                static bool dim_up = true; 
                if (current_b < 0.05f) dim_up = true;
                else if (current_b > 0.95f) dim_up = false;

                float step = dim_up ? 0.02f : -0.02f;
                float new_brightness = current_b + step;
                
                if (new_brightness > 1.0f) new_brightness = 1.0f;
                if (new_brightness < 0.01f) new_brightness = 0.01f;

                auto call = target_light->make_call();
                call.set_brightness(new_brightness);
                call.set_state(true);
                call.set_transition_length(100);
                call.perform();
            - delay: 0.1s

i2c:
  - id: bus_a
    sda: GPIO4
    scl: GPIO5
    scan: true

mcp23017:
  - id: i2c_expand07
    address: 0x20
    i2c_id: bus_a

output:
  - platform: i2c_dimmer           # Dimmer Wandlicht Keller/Stiege      
    address: 0x11
    id: dimmer_output00
    min_power: 0.25
    max_power: 0.7

switch:
  - platform: homeassistant       # remote-relay auf esp32-02
    id: remote_relay_sw07
    entity_id: switch.i2c_relay05_sw07

light:
  - platform: monochromatic         # Dimmer Wandlicht Keller/Stiege
    id: light02
    name: "light02"
    gamma_correct: 2
    output: dimmer_output00
    icon: mdi:wall-sconce-round-variant-outline
    on_turn_on:
      then:
        - switch.turn_on: remote_relay_sw07
        - delay: 200ms 
    on_turn_off:
      then:
        - switch.turn_off: remote_relay_sw07

sensor:
  - platform: wifi_signal
    name: "WiFi Signal ${device_name}"
    update_interval: 60s

  - platform: aht10
    variant: AHT20
    temperature:
      name: "Temp Speis"
      filters:
       - offset: -0.3
    humidity:
      name: "Humidity Speis"
      filters:
       - offset: 7
    update_interval: 60s

  - platform: dht
    pin: GPIO2
    model: DHT22
    temperature:
      name: "Temp K Vorraum"
      filters:
       - offset: 0.4
    humidity:
      name: "Humidity K Vorraum"
      filters:
       - offset: 2
    update_interval: 50s



binary_sensor:

  - platform: template
    id: dim_control02
    internal: true  
                              #   P I R
  - platform: gpio
    name: "pir02"
    id: pir02
    icon: mdi:motion-sensor
    pin:
      mcp23xxx: i2c_expand07
      number: 0
    device_class: motion

                            # Schalter
  - platform: gpio
    name: "bin_sens_49"
    id: bin_sens_49
    pin:
      mcp23xxx: i2c_expand07
      number: 1
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_state:
      - mqtt.publish:
           topic: "esp32-02/switch/i2c_relay05_sw05/command"
           payload: "TOGGLE"      

  - platform: gpio
    name: "bin_sens_50"
    id: bin_sens_50
    pin:
      mcp23xxx: i2c_expand07
      number: 2
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light

    on_multi_click:
    - timing:
        - ON for at most 0.3s
        - OFF for at least 0.6s
      then:
      #  - homeassistant.service:
      #      service: switch.turn_on
      #      data:
      #        entity_id: switch.i2c_relay05_sw07
      #  - delay: 100ms        
        - if:
           condition:
             light.is_off: light02
           then:
             light.turn_on: 
               id: light02
               brightness: 0.4
           else:
             light.turn_off: light02

    on_press:
      then:
      #  - homeassistant.service:
      #      service: switch.turn_on
      #      data:
      #        entity_id: switch.i2c_relay05_sw07
      #  - delay: 100ms 
        - script.execute:
            id: dimm_script02
            target_light: light02
            trigger_binary: bin_sens_50

  - platform: gpio
    name: "bin_sens_51"
    id: bin_sens_51
    pin:
      mcp23xxx: i2c_expand07
      number: 3
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_press:
      - mqtt.publish:
           topic: "esp32-02/switch/i2c_relay05_sw06/command"
