mqtt:
  broker: 10.0.0.21
  username: mqtt
  password: mqtt
  discovery: false

  on_message:
    - topic: "dimmer/dimm_script02"
      payload: "pressed02"
      then:
        - lambda: id(dim_control02).publish_state(true);
        - script.execute:
            id: dimm_script02
            target_light: light02
            trigger_binary: dim_control02
    - topic: "dimmer/dimm_script02"
      payload: "released02"
      then:
        - lambda: id(dim_control02).publish_state(false);

    - topic: "dimmer/dimm_script03"
      payload: "pressed03"
      then:
        - lambda: id(dim_control03).publish_state(true);
        - script.execute:
            id: dimm_script03
            target_light: light03
            trigger_binary: dim_control03
    - topic: "dimmer/dimm_script03"
      payload: "released03"
      then:
        - lambda: id(dim_control03).publish_state(false);

script:
  - id: dimm_script02
    parameters:
      target_light: esphome::light::LightState*
      trigger_binary: esphome::binary_sensor::BinarySensor*
    mode: restart
    then:
      - delay: 0.8s 
      - while:
          condition:
            lambda: return trigger_binary->state;
          then:
            - lambda: |-
                if (target_light == nullptr || trigger_binary == nullptr) return;         
                float current_b = target_light->remote_values.get_brightness();
                static bool dim_up = true; 
                if (current_b < 0.05f) dim_up = true;
                else if (current_b > 0.95f) dim_up = false;

                float step = dim_up ? 0.02f : -0.02f;
                float new_brightness = current_b + step;
                
                if (new_brightness > 1.0f) new_brightness = 1.0f;
                if (new_brightness < 0.01f) new_brightness = 0.01f;

                auto call = target_light->make_call();
                call.set_brightness(new_brightness);
                call.set_state(true);
                call.set_transition_length(100);
                call.perform();
            - delay: 0.1s

  - id: dimm_script03
    parameters:
      target_light: esphome::light::LightState*
      trigger_binary: esphome::binary_sensor::BinarySensor*
    mode: restart
    then:
      - delay: 0.8s 
      - while:
          condition:
            lambda: return trigger_binary->state;
          then:
            - lambda: |-
                if (target_light == nullptr || trigger_binary == nullptr) return;
                float current_b = target_light->remote_values.get_brightness();
                static bool dim_up = true; 
                if (current_b < 0.05f) dim_up = true;
                else if (current_b > 0.95f) dim_up = false;

                float step = dim_up ? 0.02f : -0.02f;
                float new_brightness = current_b + step;
                
                if (new_brightness > 1.0f) new_brightness = 1.0f;
                if (new_brightness < 0.01f) new_brightness = 0.01f;

                auto call = target_light->make_call();
                call.set_brightness(new_brightness);
                call.set_state(true);
                call.set_transition_length(100);
                call.perform();
            - delay: 0.1s

i2c:
  - id: bus_a
    sda: GPIO21
    scl: GPIO22
    scan: true

pcf8574:
  - id: i2c_relay05
    address: 0x27
    pcf8575: True
    i2c_id: bus_a

  - id: i2c_relay04
    address: 0x3B
    pcf8575: false
    i2c_id: bus_a



mcp23017:
  - id: i2c_expand06
    address: 0x20
    i2c_id: bus_a

power_supply:
  
  - id: i2c_relay05_sw07          # Wandlicht Keller/Stiege
    keep_on_time: 0.5s
    enable_time: 0.5s
    pin:
      pcf8574: i2c_relay05
      number: 7
      inverted: true

  - id: i2c_relay05_sw02          # Wohnraum Keller
    keep_on_time: 0.5s
    enable_time: 0.5s
    pin:
      pcf8574: i2c_relay05
      number: 2
      inverted: true



output:

# Dimmer Wandlicht Keller/Stiege
