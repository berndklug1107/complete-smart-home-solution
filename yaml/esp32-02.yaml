sensor:

  - platform: dht
    model: dht22
    pin: GPIO25
    temperature:
      name: "Temp K Wohnraum"
      filters:
       - offset: 2
    humidity:
      name: "Humidity K Wohnraum"
      filters:
       - offset: 1
    update_interval: 50s
  
  - platform: wifi_signal
    name: "WiFi Signal ${device_name}"
    update_interval: 60s


binary_sensor:
  - platform: template
    id: dim_control02
    internal: true

  - platform: template
    id: dim_control03
    internal: true


  - platform: gpio            # Tür Eingang K oben
    name: "bin_sens_61"
    id: bin_sens_61
    pin:
      mcp23xxx: i2c_expand06
      number: 1
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_multi_click:

    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for at most 0.3s
        - OFF for at least 0.5s        
      then:
      - switch.toggle: i2c_relay05_sw06

    - timing:
        - ON for at most 0.3s
        - OFF for at least 0.6s
      then:
        - if:
            condition:
              light.is_off: light02
            then:
              light.turn_on: 
                id: light02
                brightness: 0.4
            else:
              light.turn_off: light02

    on_press:
      then:
        - script.execute:
            id: dimm_script02
            target_light: light02
            trigger_binary: bin_sens_61
    

  - platform: gpio           #   Tür Eingang K unten
    name: "bin_sens_62"
    id: bin_sens_62
    pin:
      mcp23xxx: i2c_expand06
      number: 2
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_multi_click:
    - timing:
        - ON for at most 0.4s
        - OFF for at least 0.6s
      then:
        - switch.toggle: i2c_relay05_sw11
    - timing:
        - ON for 0.4s to 1s
        - OFF for at least 0.6s
      then:
        - switch.toggle: i2c_relay05_sw14

  - platform: gpio                # WR K Tür oben
    name: "bin_sens_63"
    id: bin_sens_63
    pin:
      mcp23xxx: i2c_expand06
      number: 3
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_multi_click:

    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for at most 0.3s
        - OFF for at least 0.4s        
      then:
        - homeassistant.service:
             service: cover.stop_cover
             data:
               entity_id: cover.rollo_keller
    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for 0.3s to 0.8s
        - OFF for at least 0.4s
      then:
        - homeassistant.service:
             service: cover.close_cover
             data:
               entity_id: cover.rollo_keller
    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for 0.8s to 1.4s
        - OFF for at least 0.4s
      then:
        - homeassistant.service:
             service: cover.open_cover
             data:
               entity_id: cover.rollo_keller

    - timing:
        - ON for at most 0.3s
        - OFF for at least 0.6s
      then:
        - if:
            condition:
              light.is_off: light03
            then:
              light.turn_on: 
                id: light03
                brightness: 0.4
            else:
              light.turn_off: light03

    on_press:
      then:
        - script.execute:
            id: dimm_script03
            target_light: light03
            trigger_binary: bin_sens_63

  - platform: gpio              # Vorraum K Tür WR R
    name: "bin_sens_64"
    id: bin_sens_64
    pin:
      mcp23xxx: i2c_expand06
      number: 4
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_multi_click:

    - timing:
        - ON for at most 0.3s
        - OFF for at least 0.6s
      then:
        - if:
