substitutions:
  device_name: esp32-05

esphome:
  name: ${device_name}            # EG Vorraum

external_components:
  source:
     type: local
     path: components
  components: [ i2c_dimmer ]

esp32:
  board: esp32dev
  framework:
     type: arduino
     advanced:
      minimum_chip_revision: "3.1"


captive_portal:

mqtt:
  broker: 10.0.0.21
  username: mqtt
  password: mqtt
  discovery: false
  
  on_message:
    - topic: "dimmer/dimm_script01"
      payload: "pressed01"
      then:
        - lambda: id(dim_control01).publish_state(true);
        - script.execute:
            id: dimm_script01
            target_light: light01
            trigger_binary: dim_control01
    - topic: "dimmer/dimm_script01"
      payload: "released01"
      then:
        - lambda: id(dim_control01).publish_state(false);


script:
  - id: dimm_script01
    parameters:
      target_light: esphome::light::LightState*
      trigger_binary: esphome::binary_sensor::BinarySensor*
    mode: restart
    then:
      - delay: 1.2s 
      - while:
          condition:
            lambda: return trigger_binary->state;
          then:
            - lambda: |-
                if (target_light == nullptr || trigger_binary == nullptr) return;
                float current_b = target_light->remote_values.get_brightness();
                static bool dim_up = true; 
                if (current_b < 0.05f) dim_up = true;
                else if (current_b > 0.95f) dim_up = false;

                float step = dim_up ? 0.02f : -0.02f;
                float new_brightness = current_b + step;
                
                if (new_brightness > 1.0f) new_brightness = 1.0f;
                if (new_brightness < 0.01f) new_brightness = 0.01f;

                auto call = target_light->make_call();
                call.set_brightness(new_brightness);
                call.set_state(true);
                call.set_transition_length(100);
                call.perform();
            - delay: 0.1s


  - id: blink_led03
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            - output.turn_on: led03
            - delay: 500ms
            - output.turn_off: led03
            - delay: 500ms

i2c:
  - id: bus_a
    sda: GPIO21
    scl: GPIO22
#    frequency: 40000
    scan: true

mcp23017:
  - id: i2c_expand04      #   EZ 
    address: 0x20
    i2c_id: bus_a

  - id: i2c_expand03      #   EG Vorraum 2
    address: 0x21
    i2c_id: bus_a

pcf8574:
  - id: i2c_relay06
    address: 0x27
    pcf8575: false
    i2c_id: bus_a


button:
  - platform: restart
    name: '${device_name} Restart'
    internal: false


power_supply:

  - id: i2c_relay06_sw08              # Dimmer Wand EG/Stiege
    keep_on_time: 1s
    enable_time: 0.5s
    pin:
      pcf8574: i2c_relay06
      number: 0
      inverted: true

  - id: i2c_relay06_sw06              # Dimmer Terrasse
    keep_on_time: 0.5s
    enable_time: 0.5s
    pin:
      pcf8574: i2c_relay06
      number: 2
      inverted: true

  - id: i2c_relay06_sw05              # Dimmer EZ Wand
    keep_on_time: 0.5s
    enable_time: 0.5s
    pin:
      pcf8574: i2c_relay06
      number: 3
      inverted: true

  - id: i2c_relay06_sw04              # Dimmer Küche
    keep_on_time: 1s
    enable_time: 0.5s
    pin:
      pcf8574: i2c_relay06
      number: 4
      inverted: true

  - id: i2c_relay06_sw03              # Dimmer EZ Tisch
    keep_on_time: 1s
    enable_time: 0.5s
    pin:
      pcf8574: i2c_relay06
      number: 5
      inverted: true


output:

# Dimmer Wand EG/Stiege
  - platform: i2c_dimmer
    id: dimmer_output10               
    address: 0x10
    power_supply: i2c_relay06_sw08
    min_power: 0.25
    max_power: 0.75

# Dimmer Terrasse
  - platform: i2c_dimmer                 
    address: 0x11
    id: dimmer_output11
    power_supply: i2c_relay06_sw06
    min_power: 0.27
    max_power: 0.57

# Dimmer EZ Wand
  - platform: i2c_dimmer                 
    address: 0x12
    id: dimmer_output12
    power_supply: i2c_relay06_sw05
    min_power: 0.25
    max_power: 0.75

# Dimmer EZ Tisch
  - platform: i2c_dimmer                 
    address: 0x14
    id: dimmer_output14
    power_supply: i2c_relay06_sw03
    min_power: 0.25
    max_power: 0.75

# Dimmer Küche
  - platform: i2c_dimmer                 
    address: 0x13
    id: dimmer_output13
    power_supply: i2c_relay06_sw04
    min_power: 0.05
    max_power: 0.96


# Status-LEDs
  - platform: gpio
    id: led01
    pin:
      mcp23xxx: i2c_expand03
      number: 10

  - platform: gpio
    id: led02
    pin:
      mcp23xxx: i2c_expand03
      number: 11

  - platform: gpio
    id: led03
    pin:
      mcp23xxx: i2c_expand03
      number: 12


switch:

  - platform: gpio
    name: "i2c_relay06_sw02"       # Lichtschacht WZ EZ
    id: i2c_relay06_sw02
    icon: mdi:lightbulb-fluorescent-tube-outline
    pin:
      pcf8574: i2c_relay06
      number: 6
      mode:
        output: true
      inverted: false

  - platform: gpio                   # leer
    name: "i2c_relay06_sw01"
    id: i2c_relay06_sw01
    pin:
      pcf8574: i2c_relay06
      number: 1
      mode:
        output: true
      inverted: true    

#  - platform: gpio                   # tot
