light:
  
  - platform: monochromatic         # Dimmer Wand EG/Stiege
    id: light01
    output: dimmer_output10
    icon: mdi:wall-sconce-round-variant-outline
    restore_mode: RESTORE_DEFAULT_OFF
    gamma_correct: 2
    name: "light01"

  - platform: monochromatic         # Dimmer EZ Wand
    id: ez_wand
    output: dimmer_output12
    icon: mdi:coach-lamp-variant
    restore_mode: RESTORE_DEFAULT_OFF
    gamma_correct: 2
    name: "EZ Wand"

  - platform: monochromatic         # Dimmer EZ Tisch
    id: ez_tisch
    output: dimmer_output14
    icon: mdi:chandelier
    restore_mode: RESTORE_DEFAULT_OFF
    gamma_correct: 2
    name: "EZ Tisch"

  - platform: monochromatic         # Dimmer Terrasse
    id: terrasse
    output: dimmer_output11
    icon: mdi:outdoor-lamp
    restore_mode: RESTORE_DEFAULT_OFF
    gamma_correct: 1.6
    name: "Terrasse"

  - platform: monochromatic         # Dimmer Küche
    id: kuche_spots
    output: dimmer_output13
    icon: mdi:light-recessed
    gamma_correct: 1.8  #2
    restore_mode: RESTORE_DEFAULT_OFF
    name: "Kuche Spots"
    effects:
      - pulse:
          name: "Pulse 2/2"
          transition_length: 2s
          update_interval: 2s
          min_brightness: 1%
          max_brightness: 100%
      - pulse:
          name: "Pulse 2/3"
          transition_length: 2s
          update_interval: 3s
          min_brightness: 1%
          max_brightness: 100%
      - pulse:
          name: "Pulse 3/3"
          transition_length: 3s
          update_interval: 3s
          min_brightness: 1%
          max_brightness: 100%
      - pulse:
          name: "Asymmetrical Pulse"
          transition_length:
            on_length: 1s
            off_length: 0.2s
          update_interval: 1.5s
          min_brightness: 1%
          max_brightness: 100%


  - platform: binary
    id: led_01
    name: "led_01"
    output: led01
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:led-on

  - platform: binary
    id: led_02
    name: "led_02"
    output: led02
    icon: mdi:led-on
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: binary
    id: led_03
    name: "led_03"
    output: led03
    icon: mdi:led-on
    restore_mode: RESTORE_DEFAULT_OFF


sensor:

  - platform: wifi_signal
    name: "WiFi Signal ${device_name}"
    update_interval: 60s

  - platform: internal_temperature
    name: "cpu-temp ${device_name}"
    update_interval: 60s
    
  - platform: dht
    pin: GPIO25
    temperature:
      name: "Temp Küche"
      filters:
       - offset: 0.3
    humidity:
      name: "Humidity Küche"
      filters:
       - offset: 4
    model: dht22
    update_interval: 50s

  - platform: dht
    pin: GPIO26
    temperature:
      name: "Temp EG Vorraum"
      filters:
       - offset: 0.4
    humidity:
      name: "Humidity EG Vorraum"
      filters:
       - offset: 3
    model: dht22
    update_interval: 50s


  - platform: aht10
    variant: AHT20
    i2c_id: bus_a
    temperature:
      name: "Temp EZ"
    humidity:
      name: "Humidity EZ"
    update_interval: 60s


binary_sensor:

  - platform: homeassistant
    id: light02_status
    entity_id: light.light02

  - platform: template
    id: dim_control01
    internal: true

  - platform: gpio        # Vorraum Tür GZ
    name: "bin_sens_25"
    id: bin_sens_25
    pin:
      mcp23xxx: i2c_expand04
      number: 0
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_multi_click:

    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for at most 0.3s
        - OFF for at least 0.4s        
      then:
        - homeassistant.service:
             service: cover.stop_cover
             data:
               entity_id: cover.rollo_gz
    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for 0.3s to 0.8s
        - OFF for at least 0.4s
      then:
        - homeassistant.service:
             service: cover.close_cover
             data:
               entity_id: cover.rollo_gz
    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for 0.8s to 1.4s
        - OFF for at least 0.4s
      then:
        - homeassistant.service:
             service: cover.open_cover
             data:
               entity_id: cover.rollo_gz

    - timing:
        - ON for at most 0.3s
        - OFF for at least 0.6s
      then:
        - if:
            condition:
              light.is_off: light01
            then:
              - light.turn_on: 
                  id: light01
                  brightness: 0.5
                  transition_length: 5s

            else:
              - light.turn_off:
                  id: light01
                  transition_length: 8s

    on_press:
      then:
        - script.execute:
            id: dimm_script01
            target_light: light01
            trigger_binary: bin_sens_25

  - platform: gpio        # GZ
    name: "bin_sens_26"
    id: bin_sens_26
    pin:
      mcp23xxx: i2c_expand04
      number: 1
      mode:
        input: true
        pullup: true
      inverted: false
    device_class: light
    on_state:
