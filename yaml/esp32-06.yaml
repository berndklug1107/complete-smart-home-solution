binary_sensor:

  - platform: homeassistant
    id: light01_status
    entity_id: light.light01

#   P I R

  - platform: gpio
    name: "pir01"
    id: pir01
    pin: GPIO16
    icon: mdi:motion-sensor
    device_class: motion


#   Schalter OG ost

  - platform: gpio              # OG Vorraum Tür ost unten rechts (S)
    name: "bin_sens_01"
    id: bin_sens_01
    pin:
      mcp23xxx: i2c_expand01
      number: 0
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_state:
      - mqtt.publish:
          topic: "esp32-02/switch/i2c_relay05_sw09/command"
          payload: "TOGGLE"

  - platform: gpio             # OG Vorraum Tür ost unten links (T)
    name: "bin_sens_02"
    id: bin_sens_02
    pin:
      mcp23xxx: i2c_expand01
      number: 1
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_multi_click:

    - timing:
        - ON for at most 0.3s
        - OFF for at least 0.6s
      then:
        - if:
            condition:
              binary_sensor.is_off: light01_status
            then:
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.light01
                    brightness_pct: "40"
                    transition: "5"
            else:
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.light01
                    transition: "8"

    on_press:
      then:
        - mqtt.publish:
            topic: "dimmer/dimm_script01"
            payload: "pressed01"
    on_release:
      then:
        - mqtt.publish:
            topic: "dimmer/dimm_script01"
            payload: "released01"

  - platform: gpio              # OG Vorraum Tür ost oben (T)
    name: "bin_sens_03"
    id: bin_sens_03
    pin:
      mcp23xxx: i2c_expand01
      number: 2
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_multi_click:
    - timing:
        - ON for at most 0.3s
        - OFF for at least 0.6s
      then:
        - switch.toggle: i2c_relay02_sw02        
    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for at most 0.3s
        - OFF for at least 0.4s        
      then:
        - homeassistant.service:
             service: cover.stop_cover
             data:
               entity_id: cover.rollo_og_ost
    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for 0.3s to 0.8s
        - OFF for at least 0.4s
      then:
        - homeassistant.service:
             service: cover.close_cover
             data:
               entity_id: cover.rollo_og_ost
    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for 0.8s to 1.4s
        - OFF for at least 0.4s
      then:
        - homeassistant.service:
             service: cover.open_cover
             data:
               entity_id: cover.rollo_og_ost

  - platform: gpio          # OG ost Balkon
    name: "bin_sens_04"
    id: bin_sens_04
    pin:
      mcp23xxx: i2c_expand01
      number: 3
      mode:
        input: true
        pullup: true
      inverted: false
    device_class: light
    on_state:
      then:
      - switch.toggle: i2c_relay01_sw02

  - platform: gpio          # OG ost rechts (S)
    name: "bin_sens_05"
    id: bin_sens_05
    pin:
      mcp23xxx: i2c_expand01
      number: 4
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_state:
      then:
      - switch.toggle: i2c_relay01_sw01

  - platform: gpio          # OG ost links (S)
    name: "bin_sens_06"
    id: bin_sens_06
    pin:
      mcp23xxx: i2c_expand01
      number: 5
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_state:
      then:
      - switch.toggle: i2c_relay01_sw00


            #   OG Vorraum / Bad

  - platform: gpio            # OG Bad unten (T)
    name: "bin_sens_07"
    id: bin_sens_07
    pin:
      mcp23xxx: i2c_expand00
      number: 0
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_multi_click:
    - timing:
        - ON for at most 0.4s
        - OFF for at least 0.6s
      then:
        - switch.toggle: i2c_relay02_sw01     # Bad Bodenspots
    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for at most 0.3s
        - OFF for at least 0.4s        
      then:
        - homeassistant.service:
             service: cover.stop_cover
             data:
               entity_id: cover.rollo_bad
    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for 0.3s to 0.8s
        - OFF for at least 0.4s
      then:
        - homeassistant.service:
             service: cover.close_cover
             data:
               entity_id: cover.rollo_bad
    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for 0.8s to 1.4s
        - OFF for at least 0.4s
      then:
        - homeassistant.service:
             service: cover.open_cover
             data:
               entity_id: cover.rollo_bad

  - platform: gpio              # OG Bad oben ((T)
    name: "bin_sens_08"
    id: bin_sens_08
    pin:
      mcp23xxx: i2c_expand00
      number: 1
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_multi_click:
    - timing:
        - ON for 0.3s to 0.8s
        - OFF for at least 0.4s
      then:
        - homeassistant.service:
            service: media_player.play_media
            data:
              entity_id: media_player.nad_bad
              media_content_id: "http://10.0.0.30:8082/rock" 
              media_content_type: "music"

    - timing:
        - ON for 0.8s to 1.4s
        - OFF for at least 0.4s
      then:
        - homeassistant.service:
            service: media_player.play_media
            data:
              entity_id: media_player.nad_bad
              media_content_id: "http://10.0.0.31:8082/main"
              media_content_type: "music"

    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for at most 0.3s
        - OFF for at most 0.4s
        - ON for at most 0.3s
        - OFF for at least 0.4s
      then:
        - homeassistant.service:
            service: media_player.play_media
            data:
              entity_id: media_player.nad_bad
              media_content_id: "http://10.0.0.33:8082/mellow"
              media_content_type: "music"

    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for at most 0.3s
        - OFF for at least 0.4s        
      then:
         - homeassistant.service:
              service: media_player.media_next_track
              data:
                entity_id: media_player.touch_pi

    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for 0.3s to 0.8s
        - OFF for at least 0.4s        
      then:
         - homeassistant.service:
              service: media_player.media_previous_track
              data:
                entity_id: media_player.touch_pi

    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for at least 0.8s
        - OFF for at least 0.4s
      then:
         - homeassistant.service:
              service: media_player.media_play_pause
              data:
                entity_id: media_player.touch_pi

    - timing:
        - ON for at most 0.3s
        - OFF for at least 0.6s
      then:
        - if:
            condition:
              light.is_off: light00
            then:
              - light.turn_on: 
                  id: light00
                  brightness: 0.7
                  transition_length: 5s
            else:
              - light.turn_off:
                  id: light00
                  transition_length: 5s
    on_press:
      then:
        - script.execute:
            id: dimm_script00
            target_light: light00
            trigger_binary: bin_sens_08

  - platform: gpio              # OG Vorraum Tür mitte unten rechts (T)
    name: "bin_sens_09"
    id: bin_sens_09
    pin:
      mcp23xxx: i2c_expand00
      number: 2
      mode:
        input: true
        pullup: true
      inverted: true
    device_class: light
    on_multi_click:
    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for at most 0.3s
        - OFF for at least 0.4s        
      then:
        - homeassistant.service:
             service: cover.stop_cover
             data:
               entity_id: cover.rollo_og_mitte
    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for 0.3s to 0.8s
        - OFF for at least 0.4s
      then:
        - homeassistant.service:
             service: cover.close_cover
             data:
               entity_id: cover.rollo_og_mitte
    - timing:
        - ON for at most 0.3s
        - OFF for at most 0.3s
        - ON for 0.8s to 1.4s
        - OFF for at least 0.4s
      then:
        - homeassistant.service:
             service: cover.open_cover
             data:
               entity_id: cover.rollo_og_mitte

    - timing:
        - ON for at most 0.3s
        - OFF for at least 0.6s
      then:
        - if:
            condition:
              binary_sensor.is_off: light01_status
            then:
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.light01
                    brightness_pct: "40"
                    transition: "5"
            else:
              - homeassistant.service:
                  service: light.turn_off
                  data:
                    entity_id: light.light01
                    transition: "8"

    on_press:
      then:
        - mqtt.publish:
            topic: "dimmer/dimm_script01"
            payload: "pressed01"
    on_release:
      then:
        - mqtt.publish:
            topic: "dimmer/dimm_script01"
            payload: "released01"


