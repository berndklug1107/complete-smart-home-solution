substitutions:
  device_name: esp32-06

esphome:
  name: ${device_name}           #  OG HK Verteiler

esp32:
  board: esp32dev
  framework:
     type: arduino
     advanced:
      minimum_chip_revision: "3.1"
   
external_components:
  source:
     type: local
     path: components
  components: [ i2c_dimmer ]

logger:


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password



captive_portal:

mqtt:
  broker: 10.0.0.21
  username: mqtt
  password: mqtt
  discovery: false


script:
  - id: dimm_script00
    parameters:
      target_light: esphome::light::LightState*
      trigger_binary: esphome::binary_sensor::BinarySensor*
    mode: restart
    then:
      - delay: 1.2s 
      - while:
          condition:
            lambda: return trigger_binary->state;
          then:
            - lambda: |-
                if (target_light == nullptr || trigger_binary == nullptr) return;
                float current_b = target_light->remote_values.get_brightness();
                static bool dim_up = true; 
                if (current_b < 0.05f) dim_up = true;
                else if (current_b > 0.95f) dim_up = false;

                float step = dim_up ? 0.02f : -0.02f;
                float new_brightness = current_b + step;
                
                if (new_brightness > 1.0f) new_brightness = 1.0f;
                if (new_brightness < 0.01f) new_brightness = 0.01f;

                auto call = target_light->make_call();
                call.set_brightness(new_brightness);
                call.set_state(true);
                call.set_transition_length(100);
                call.perform();
            - delay: 0.1s


i2c:
  - id: bus_a
    sda: GPIO21
    scl: GPIO22
    scan: true
    frequency: 40kHz    

one_wire:
  - platform: gpio
    pin: GPIO19
    id: hub_01


pcf8574:
  - id: i2c_relay01   # ost
    address: 0x3F
    pcf8575: false
    i2c_id: bus_a

  - id: i2c_relay02   # vorraum / bad / mitte
    address: 0x26
    pcf8575: false
    i2c_id: bus_a

mcp23017:
  - id: i2c_expand01  # OG Ost
    address: 0x20
    i2c_id: bus_a

  - id: i2c_expand02  # OG Mitte
    address: 0x21
    i2c_id: bus_a

  - id: i2c_expand00   # OG Vorraum / Bad
    address: 0x22
    i2c_id: bus_a

power_supply:
  - id: i2c_relay02_sw00               # Dimmer Bad
    keep_on_time: 0.2s
    pin:
      pcf8574: i2c_relay02
      number: 0
      inverted: true

button:
  - platform: restart
    name: '${device_name} Restart'
    internal: false


light:
  - platform: monochromatic           # Dimmer Bad
    id: light00
    icon: mdi:light-recessed
    name: "light00"
    output: dimmer_20
    restore_mode: RESTORE_DEFAULT_OFF
    gamma_correct: 2
    effects:
      - pulse:
      - pulse:
          name: "Pulse 2/2"
          transition_length: 2s
          update_interval: 2s
          min_brightness: 1%
          max_brightness: 100%
      - pulse:
          name: "Pulse 2/3"
          transition_length: 2s
          update_interval: 3s
          min_brightness: 1%
          max_brightness: 100%
      - pulse:
          name: "Pulse 3/3"
          transition_length: 3s
          update_interval: 3s
          min_brightness: 1%
          max_brightness: 100%
      - pulse:
          name: "Asymmetrical Pulse"
          transition_length:
            on_length: 1s
            off_length: 0.2s
          update_interval: 1.5s
          min_brightness: 1%
          max_brightness: 100%

